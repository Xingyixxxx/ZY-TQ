<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三枚铜钱起卦 — 易经占卜</title>
    <meta name="description" content="传统三枚铜钱起卦法，体验古法易经占卜的庄重仪式感。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景装饰粒子 -->
    <canvas id="bg-particles"></canvas>

    <div class="container">
        <!-- 标题区 -->
        <header>
            <div class="title-ornament">✦</div>
            <h1>三枚铜钱起卦</h1>
            <p class="subtitle">请静心片刻，默念所问之事<br>点击铜钱六次，自下而上成卦</p>
            <div class="title-divider"></div>
        </header>

        <!-- 主要起卦区 -->
        <main id="main-area">
            <!-- 铜钱区 -->
            <section class="coins-area" id="coins-area">
                <div class="coin-container">
                    <div class="coin" id="coin-1">
                        <div class="coin-face coin-front">
                            <div class="coin-inner-ring"></div>
                            <span class="char char-top">乾</span>
                            <span class="char char-bottom">隆</span>
                            <span class="char char-left">通</span>
                            <span class="char char-right">宝</span>
                            <div class="coin-square-hole"></div>
                        </div>
                        <div class="coin-edge"></div>
                        <div class="coin-face coin-back">
                            <div class="coin-inner-ring"></div>
                            <span class="manchu manchu-left">ᠠᠪᡴᠠᡳ</span>
                            <span class="manchu manchu-right">ᠸᡝᡥᡝ</span>
                            <div class="coin-square-hole"></div>
                        </div>
                    </div>
                    <div class="coin-shadow"></div>
                </div>
                <div class="coin-container">
                    <div class="coin" id="coin-2">
                        <div class="coin-face coin-front">
                            <div class="coin-inner-ring"></div>
                            <span class="char char-top">乾</span>
                            <span class="char char-bottom">隆</span>
                            <span class="char char-left">通</span>
                            <span class="char char-right">宝</span>
                            <div class="coin-square-hole"></div>
                        </div>
                        <div class="coin-edge"></div>
                        <div class="coin-face coin-back">
                            <div class="coin-inner-ring"></div>
                            <span class="manchu manchu-left">ᠠᠪᡴᠠᡳ</span>
                            <span class="manchu manchu-right">ᠸᡝᡥᡝ</span>
                            <div class="coin-square-hole"></div>
                        </div>
                    </div>
                    <div class="coin-shadow"></div>
                </div>
                <div class="coin-container">
                    <div class="coin" id="coin-3">
                        <div class="coin-face coin-front">
                            <div class="coin-inner-ring"></div>
                            <span class="char char-top">乾</span>
                            <span class="char char-bottom">隆</span>
                            <span class="char char-left">通</span>
                            <span class="char char-right">宝</span>
                            <div class="coin-square-hole"></div>
                        </div>
                        <div class="coin-edge"></div>
                        <div class="coin-face coin-back">
                            <div class="coin-inner-ring"></div>
                            <span class="manchu manchu-left">ᠠᠪᡴᠠᡳ</span>
                            <span class="manchu manchu-right">ᠸᡝᡥᡝ</span>
                            <div class="coin-square-hole"></div>
                        </div>
                    </div>
                    <div class="coin-shadow"></div>
                </div>
            </section>

            <!-- 投掷结果指示 -->
            <section class="coin-result-indicators" id="coin-indicators">
                <div class="indicator" id="indicator-1"><span>—</span></div>
                <div class="indicator" id="indicator-2"><span>—</span></div>
                <div class="indicator" id="indicator-3"><span>—</span></div>
            </section>

            <!-- 投掷控制区 -->
            <section class="controls-area">
                <button id="toss-btn">
                    <span class="btn-icon">☰</span>
                    <span class="btn-text">开始起卦</span>
                </button>
                <div class="progress-wrapper">
                    <p id="progress-text">第 <span class="progress-current">0</span> / <span class="progress-total">6</span> 爻</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <p id="status-text" class="status-msg">准备就绪，请点击开始起卦</p>
            </section>

            <!-- 六爻记录区 -->
            <section class="records-area">
                <h3>已生成爻列表</h3>
                <ul id="lines-record">
                    <!-- 爻记录项将通过 JS 动态插入 -->
                </ul>
            </section>
        </main>

        <!-- 结果展示区 (默认隐藏) -->
        <section id="result-area" class="hidden">
            <!-- 卦象图片翻转卡片 -->
            <div class="hexagram-card-wrapper">
                <div class="hexagram-card" id="hexagram-card">
                    <div class="hexagram-card-inner" id="hexagram-card-inner">
                        <div class="hexagram-card-front">
                            <img id="hexagram-img-front" src="" alt="卦象正面">
                        </div>
                        <div class="hexagram-card-back">
                            <img id="hexagram-img-back" src="" alt="卦象背面">
                        </div>
                    </div>
                </div>
                <p class="flip-hint" id="flip-hint">
                    <span class="flip-icon">↻</span> 点击卡片翻转查看
                </p>
            </div>

            <div class="actions card-actions" id="card-actions">
                <button id="reset-btn">
                    <span class="btn-icon">↺</span>
                    <span class="btn-text">重新起卦</span>
                </button>
            </div>
        </section>

        <footer>
            <p>以诚心敬问 · 以智慧解惑</p>
        </footer>
    </div>

    <script src="hexagramData.js"></script>
    <script src="script.js"></script>
</body>
</html>
